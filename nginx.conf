server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Compression ─────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"            always;
    add_header X-Content-Type-Options "nosniff"               always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    server_tokens off;

    # ── SPA fallback — all unknown paths serve index.html ───────────────────
    location / {
        try_files $uri $uri/ /index.html;

        # index.html must not be cached so browsers always fetch the
        # latest entry point (which points to the current hashed bundles)
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma        "no-cache"                            always;
        add_header Expires       "0"                                   always;
    }

    # ── Immutable static assets (Vite adds content hashes to filenames) ──────
    location ~* ^/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # ── Other static files (fonts, images, icons from static/) ──────────────
    location ~* \.(png|jpg|jpeg|gif|webp|svg|ico|woff|woff2|ttf|otf)$ {
        expires 30d;
        add_header Cache-Control "public" always;
    }

    # ── Health check endpoint for Cloud Run startup probe ───────────────────
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
